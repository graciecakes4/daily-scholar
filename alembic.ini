# Alembic Config File
#
# Daily Scholar uses Alembic for schema migrations. The actual database URL
# is read from the DATABASE_URL environment variable in alembic/env.py, not
# from this file, so the same alembic.ini works for both SQLite (local beta)
# and Postgres (Railway).
#
# Common commands:
#   alembic current                              # show current revision
#   alembic history                              # list all migrations
#   alembic upgrade head                         # apply all pending migrations
#   alembic revision --autogenerate -m "msg"     # generate a new migration from model changes
#   alembic stamp 0001_baseline                  # mark an existing DB as already at the baseline (for beta-tester upgrades)

[alembic]
# path to migration scripts, relative to alembic.ini
script_location = alembic

# template used for new migration files
file_template = %%(rev)s_%%(slug)s

# timezone for new migration files
timezone = UTC

# sqlalchemy.url is intentionally NOT set here; env.py reads DATABASE_URL
# from the environment so the same config works across runtime modes.
sqlalchemy.url =


[post_write_hooks]
# (none — could wire `black` here if we want auto-formatting on migration generation)


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
