learning_objectives:
- Explain in plain language what makes a model a "foundation model"
- List the main data modalities in time-domain astronomy and what physical information
  each carries
- Sketch a CLIP-style contrastive cross-modal alignment objective at a high level
- Compare frozen vs. fine-tuned encoders in terms of cost and downstream quality
- Describe what AstroM³ and Maven contributed and where they fall short of full modality-flexible
  inference
