key_concepts:
- 'diffusion models in plain language: add noise gradually, then learn to reverse
  it'
- 'conditional diffusion: generating one modality conditioned on another that''s available'
- generating a missing modality vs. inferring directly from what you have (the two
  main missing-modality strategies)
- working in latent space vs. pixel/wavelength space and why latent is usually cheaper
- posterior samples from diffusion give natural uncertainty estimates
- calibration metrics (Expected Calibration Error, Brier score, reliability diagrams)
  and why they matter for downstream science decisions
- how cross-modal generation extends to astronomy (image → spectrum, photometry →
  spectrum, etc.)
- template-based synthesis as a simpler alternative to learned diffusion (e.g., per-class
  spectral templates)
learning_objectives:
- Explain the forward and reverse processes of a diffusion model at a conceptual level
- Define conditional generation and give a concrete cross-modal example from astronomy
- Compare deterministic missing-modality imputation against generative imputation
  in terms of what each model outputs
- Define ECE and Brier score, and explain why a well-calibrated probabilistic classifier
  matters when telescope time is at stake
- Identify what Doorenbos et al. (2024) demonstrated for image → spectrum prediction
  and what gap remains for transient classification
