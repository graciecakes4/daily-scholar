key_concepts:
- the wind-driven and thermohaline components of the ocean circulation
- the AMOC and why it matters for climate
- Ekman dynamics and the structure of the gyres
- western boundary currents and why they're sharper than eastern ones
- the mixed layer, thermocline, and how surface heat is exchanged with the deep ocean
- the contributions to sea level rise (thermal expansion vs ice mass)
- ENSO as the dominant mode of interannual ocean-atmosphere variability
- ocean acidification as a direct consequence of CO2 uptake
learning_objectives:
- Explain why Ekman transport is perpendicular to the wind direction
- Sketch the structure of a subtropical gyre and label the western boundary current
- Decompose observed sea level rise into thermal-expansion and ice-mass contributions
- Distinguish El Nino from La Nina by sea surface temperature pattern
- Describe one mechanism by which ocean acidification affects marine ecosystems
