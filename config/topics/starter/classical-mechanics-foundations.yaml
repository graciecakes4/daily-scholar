key_concepts:
- Newton's laws and their formulation in terms of forces and accelerations
- the principle of least action and the Euler-Lagrange equations
- the connection between symmetries and conservation laws (Noether's theorem)
- Hamiltonian formulation, canonical coordinates, and phase space
- normal modes and small oscillations about equilibrium
- central-force problems and the structure of Keplerian orbits
- rigid-body motion and the inertia tensor
- the basic vocabulary of nonlinear dynamics and chaos
learning_objectives:
- Derive the Euler-Lagrange equation from the principle of least action
- Identify a conserved quantity from a continuous symmetry of the Lagrangian
- Convert between Lagrangian and Hamiltonian formulations of a simple system
- Solve the small-oscillation problem for a coupled mass-spring system
- Reduce a two-body problem to an effective one-body problem in a central potential
