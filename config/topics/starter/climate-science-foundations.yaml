key_concepts:
- the greenhouse effect at the level of the planetary energy budget
- radiative forcing as the common currency for comparing perturbations
- the major climate feedbacks (water vapor, ice-albedo, clouds) and their signs
- equilibrium climate sensitivity vs transient climate response
- how a general circulation model is structured and what CMIP is
- emission scenarios — what RCP and SSP labels actually encode
- the carbon cycle and the role of land and ocean sinks
- detection-and-attribution as the statistical bridge between forcing and observed change
learning_objectives:
- Use a simple energy-balance model to predict the temperature change from a forcing
- Identify which of the major feedbacks are positive versus negative and why
- Distinguish equilibrium climate sensitivity from transient climate response
- Explain what a CMIP model intercomparison shows and what it does not
- Describe the difference between climate mitigation and climate adaptation
