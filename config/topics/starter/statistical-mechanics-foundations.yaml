key_concepts:
- the microcanonical, canonical, and grand canonical ensembles and when each applies
- the partition function as the bridge between microscopic states and thermodynamics
- entropy as an information-theoretic and thermodynamic quantity
- the three quantum statistics (Maxwell-Boltzmann, Fermi-Dirac, Bose-Einstein)
- the Ising model and the universal features of second-order phase transitions
- mean-field theory and its predictions for critical exponents
- the renormalization-group idea and universality classes
- linear response, fluctuation-dissipation, and basic nonequilibrium tools
learning_objectives:
- Derive the Boltzmann distribution from the canonical ensemble
- Compute the partition function and free energy of a two-level system
- Identify the order parameter for the Ising model and explain mean-field predictions
- Distinguish the three quantum statistics by their occupation numbers
- Explain the fluctuation-dissipation theorem in plain language
