- the cell cycle, its checkpoints, and how it goes wrong in cancer
- the difference between mitosis and meiosis
- apoptosis as a regulated form of cell death
- stem cells and the basics of differentiation
learning_objectives:
- Identify the major organelles in a labeled diagram and state each one's role
- Trace a signal from a GPCR to a downstream cellular response
- List the phases of the cell cycle and the key checkpoints between them
- Distinguish mitosis from meiosis in one sentence
- Describe one example of how a stem cell decides between self-renewal and differentiation
