learning_objectives:
- Solve the time-independent Schrodinger equation for the infinite square well
- Compute expectation values and uncertainties for position and momentum
- Apply first-order perturbation theory to a small Hamiltonian shift
- Construct the joint state of two spin-1/2 particles and identify entangled states
- Explain why Bell-inequality violations rule out local hidden-variable theories
