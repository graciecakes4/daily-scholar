key_concepts:
- what a light curve is and why brightness-over-time is the primary input
- 'transient vs. variable: one-off events (supernovae, kilonovae) vs. repeating signals'
- how astronomers group transient types into a hierarchy (e.g., transient → supernova
  → SN Ia/II/Ib/Ic)
- multi-band photometry (ugrizy) and what color information adds beyond a single band
- why light-curve data is irregularly sampled and what that means for ML models
- the role of alert brokers (Fink, ALeRCE, ANTARES) in classifying real-time survey
  alerts
- simulated benchmarks (PLAsTiCC, ELAsTiCC) and why training starts on simulation
- evaluation under class imbalance (macro-F1, per-class precision/recall)
learning_objectives:
- Explain what a light curve is and why classifying transients from photometry alone
  is hard
- Distinguish transients from variables and name three subtypes of each
- Describe how multi-band photometry adds signal compared to a single band
- Explain why macro-F1 is preferred over plain accuracy for imbalanced transient classes
- Recognize the named SOTA classifiers (ORACLE, ATAT, ATCAT) as competitive baselines
  on ELAsTiCC
