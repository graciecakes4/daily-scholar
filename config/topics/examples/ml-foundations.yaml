key_concepts:
- the structure of a feedforward neural network (layers, weights, activations)
- 'the basics of training: loss function, gradient descent, backprop, optimizer choice'
- common architectures (MLP, CNN, transformer) and which data shapes each fits best
- multi-class classification with softmax and cross-entropy loss
- evaluating imbalanced classification with F1, macro F1, precision, recall, and confusion
  matrices
- overfitting and the standard mitigations (dropout, regularization, early stopping)
- what fine-tuning a pretrained model does, and why it usually beats training from
  scratch
- parameter-efficient fine-tuning (LoRA, adapters) and when to reach for it
- 'diffusion models: the forward noising process, the learned reverse process, and
  conditional generation'
learning_objectives:
- Diagram a forward pass through a small MLP and explain what backprop computes
- Choose an appropriate loss function for a multi-class problem and explain the choice
- Compute macro F1 from a small confusion matrix by hand
- Identify overfitting from a learning curve and propose three mitigations
- Explain the difference between full fine-tuning and LoRA at the parameter-update
  level
- Describe the forward and reverse processes of a diffusion model in plain language
