recency_days: 30
min_relevance: 0.15

# learning content
key_concepts:
  - what a language model is at a high level
  - the basic ingredients of training (loss, gradient descent, optimizer, batch)
  - common architectures (MLP, CNN, transformer) and when each applies
  - fine-tuning, transfer learning, and parameter-efficient adaptation (LoRA, adapters)
  - retrieval-augmented generation (RAG) and vector databases
  - evaluation under class imbalance (precision, recall, F1)
  - interpretability tools (attention patterns, probing classifiers, sparse autoencoders)
  - reinforcement learning vocabulary (policy, reward, value, Q-learning, PPO)

learning_objectives:
  - Explain transformer architecture and the self-attention mechanism
  - Choose a fine-tuning strategy (full vs LoRA vs adapters) for a given budget
  - Identify common LLM safety / alignment terms and their roles
  - Compare model compression techniques (distillation, quantization, pruning)
  - Read a benchmark paper and identify the leaderboard task it targets

