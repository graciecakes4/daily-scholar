key_concepts:
- what flux is, physically, and why astronomers express it as magnitude
- the inverse-square law and the difference between apparent and absolute magnitude
- filter bands (ugrizy) and what color information adds beyond a single band
- what a light curve is and how it encodes physical evolution over time
- what spectra tell us — composition, temperature, motion (Doppler/redshift), and
  density
- emission vs. absorption lines and where each comes from
- the supernova spectral taxonomy (Ia / Ib / Ic / II) and its physical basis
- what makes something a "transient" vs. a "variable star"
- what a sky survey is, and how photometric vs. spectroscopic surveys differ
- host-galaxy context and why it helps identify transient types
learning_objectives:
- Explain flux and the magnitude scale, and convert intuitively between them
- Read a light curve and identify whether it depicts a transient or a variable
- Identify supernova types from a few key spectral features (Si II → Ia, H Balmer
  → II, He I → Ib)
- Describe at least three reasons photometric surveys cannot replace spectroscopic
  confirmation
- Name three major time-domain surveys (e.g., ZTF, Pan-STARRS, Rubin/LSST) and what
  each produces
