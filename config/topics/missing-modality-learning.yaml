key_concepts:
- what "missing modality" means at inference time vs. during training
- why simply zeroing out a missing modality usually hurts performance
- learnable modality tokens as a trained replacement for zero/mean imputation
- 'modality dropout during training: randomly hiding modalities to force the model
  to handle their absence'
- 'shortcut learning: when one modality carries near-perfect class info and the model
  leans entirely on it'
- attention-based fusion architectures and how they interact with missing inputs
- methodological transfer from medical imaging (multi-MRI sequences) to astronomy
learning_objectives:
- Define missing-modality learning and contrast it with the standard fully-paired
  multimodal setting
- List at least three strategies for handling missing modalities at inference (zero
  imputation, learnable tokens, generative imputation)
- Explain why modality dropout during training is necessary, not optional
- Identify shortcut learning when reading a multimodal paper and propose a mitigation
- Compare the medical-imaging missing-modality literature against the astronomy setting
  at a high level
