key_concepts:
- the gap between simulated training data and real observational data, and why it
  shows up
- common sources of sim-to-real degradation (distribution shift, selection bias, simulator
  artifacts)
- fine-tuning as the standard strategy for bridging the gap
- 'selection bias in spectroscopic follow-up: which transients get classified, which
  don''t, and why that biases training data'
- 'cross-matching: combining photometric catalogs with spectroscopic and imaging catalogs
  to build a real-data set'
- evaluation pitfalls (data leakage across nearby sky regions) and why stratified
  splits matter
- measuring the sim-to-real gap as a contribution in its own right
learning_objectives:
- Explain why a classifier trained on ELAsTiCC simulations often degrades on real
  ZTF data
- Identify three sources of distribution shift between simulated and real photometry
- Describe a basic fine-tuning protocol for sim-to-real transfer (lower learning rate,
  careful regularization)
- Recognize selection bias in a transient sample and propose one or two mitigations
- Sketch the cross-matching workflow (TNS → ZTF → DES/Legacy host imagery) at a high
  level
