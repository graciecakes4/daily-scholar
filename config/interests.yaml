# Daily Scholar - Research Interests Configuration
# 
# OPTIMIZED VERSION - Keywords aligned with how papers are actually written
# Focus on terms that appear in titles and abstracts

interests:
  # Primary research areas - highest priority
  primary:
    - name: "Large Language Models"
      keywords:
        # Core terms (appear in most LLM papers)
        - "large language model"
        - "language model"
        - "LLM"
        - "GPT"
        - "transformer"
        # Training & Fine-tuning
        - "fine-tuning"
        - "fine-tune"
        - "pretraining"
        - "instruction tuning"
        - "alignment"
        - "RLHF"
        - "preference optimization"
        # Inference & Efficiency
        - "inference"
        - "speculative decoding"
        - "KV cache"
        - "quantization"
        - "pruning"
        # Safety & Control
        - "AI safety"
        - "jailbreak"
        - "red teaming"
        - "guardrails"
      weight: 2.0
      arxiv_categories: ["cs.CL", "cs.LG", "cs.AI"]

    - name: "Deep Learning"
      keywords:
        # Core
        - "deep learning"
        - "neural network"
        - "deep neural"
        # Architectures
        - "attention mechanism"
        - "self-attention"
        - "residual"
        - "encoder"
        - "decoder"
        # Training
        - "backpropagation"
        - "gradient descent"
        - "optimization"
        - "loss function"
        - "regularization"
        # Generative
        - "generative model"
        - "diffusion model"
        - "autoencoder"
        - "VAE"
        - "GAN"
      weight: 1.8
      arxiv_categories: ["cs.LG", "stat.ML"]

    - name: "NLP Applications"
      keywords:
        # Core NLP
        - "natural language"
        - "text generation"
        - "text classification"
        - "sentiment"
        - "summarization"
        # Understanding
        - "reading comprehension"
        - "question answering"
        - "information extraction"
        - "named entity"
        # Embeddings
        - "word embedding"
        - "sentence embedding"
        - "semantic similarity"
        # Evaluation
        - "benchmark"
        - "evaluation"
        - "human evaluation"
      weight: 1.5
      arxiv_categories: ["cs.CL", "cs.AI"]

    - name: "Interpretability & Mechanistic"
      keywords:
        # Core
        - "interpretability"
        - "mechanistic interpretability"
        - "explainability"
        - "explainable AI"
        # Techniques
        - "sparse autoencoder"
        - "activation"
        - "probing"
        - "feature visualization"
        - "attention pattern"
        - "circuit"
        # Analysis
        - "representation"
        - "latent space"
        - "internal representation"
        - "hidden state"
      weight: 1.8
      arxiv_categories: ["cs.LG", "cs.CL", "cs.AI"]

    - name: "Reinforcement Learning"
      keywords:
        # Core
        - "reinforcement learning"
        - "RL"
        - "policy"
        - "reward"
        - "agent"
        # Algorithms
        - "Q-learning"
        - "policy gradient"
        - "actor-critic"
        - "PPO"
        - "DQN"
        # Advanced
        - "multi-agent"
        - "offline RL"
        - "model-based"
        - "world model"
        - "exploration"
      weight: 1.5
      arxiv_categories: ["cs.LG", "cs.AI"]

    - name: "Efficient ML"
      keywords:
        # Compression
        - "model compression"
        - "knowledge distillation"
        - "distillation"
        - "pruning"
        - "quantization"
        # PEFT
        - "LoRA"
        - "adapter"
        - "parameter efficient"
        - "low-rank"
        # Small Models
        - "efficient"
        - "lightweight"
        - "edge"
        - "mobile"
        # Memory
        - "memory efficient"
        - "gradient checkpointing"
      weight: 1.8
      arxiv_categories: ["cs.LG", "cs.CL"]

  # Secondary interests
  secondary:
    - name: "Computer Vision"
      keywords:
        - "computer vision"
        - "image"
        - "visual"
        - "vision transformer"
        - "ViT"
        - "object detection"
        - "segmentation"
        - "multimodal"
        - "vision-language"
      weight: 1.0
      arxiv_categories: ["cs.CV", "cs.LG"]

    - name: "ML Systems & Infrastructure"
      keywords:
        # Distributed
        - "distributed training"
        - "parallel"
        - "GPU"
        - "TPU"
        # Frameworks
        - "PyTorch"
        - "JAX"
        - "TensorFlow"
        # Serving
        - "serving"
        - "deployment"
        - "latency"
        - "throughput"
        # Optimization
        - "kernel"
        - "CUDA"
        - "compiler"
      weight: 1.2
      arxiv_categories: ["cs.LG", "cs.DC", "cs.PF"]

    - name: "Data & Evaluation"
      keywords:
        # Data
        - "dataset"
        - "data augmentation"
        - "synthetic data"
        - "data quality"
        # Evaluation
        - "benchmark"
        - "evaluation"
        - "metric"
        - "leaderboard"
        # Robustness
        - "robustness"
        - "adversarial"
        - "out-of-distribution"
        - "generalization"
      weight: 1.0
      arxiv_categories: ["cs.LG", "cs.CL", "cs.CV"]

    - name: "Probabilistic ML"
      keywords:
        - "Bayesian"
        - "probabilistic"
        - "uncertainty"
        - "variational"
        - "MCMC"
        - "Gaussian process"
        - "posterior"
        - "prior"
        - "likelihood"
      weight: 0.8
      arxiv_categories: ["stat.ML", "cs.LG"]

  # Exploratory - lower priority
  exploratory:
    - name: "Scientific ML"
      keywords:
        - "scientific machine learning"
        - "physics-informed"
        - "simulation"
        - "molecular"
        - "protein"
        - "drug discovery"
      weight: 0.5
      arxiv_categories: ["cs.LG", "physics.comp-ph", "q-bio.BM"]

    - name: "Robotics & Embodied AI"
      keywords:
        - "robotics"
        - "robot"
        - "embodied"
        - "manipulation"
        - "navigation"
        - "control"
      weight: 0.5
      arxiv_categories: ["cs.RO", "cs.AI"]

# Search configuration
search_config:
  recency_days: 30
  min_relevance: 0.2      # Lowered - scoring is normalized across all interests
  papers_per_search: 20
  prefer_with_code: true
  exclude_seen: true
  sources:
    - arxiv
    - semantic_scholar
    - core

# Daily paper selection
daily_selection:
  papers_per_day: 1
  strategy: "top_relevance"
  ensure_diversity: true
