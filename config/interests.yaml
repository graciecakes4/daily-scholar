        - "expectation maximization"
        - "PAC learning"
        - "bias-variance tradeoff"
        # Causal
        - "causal inference"
        - "causal discovery"
        - "structural causal models"
        - "average treatment effect"
        # Core
        - "uncertainty quantification"
        - "Bayesian neural networks"
      weight: 1.0
      arxiv_categories: ["stat.ML", "stat.ME", "stat.TH"]
    
    - name: "Applied Mathematics"
      keywords:
        # Optimization
        - "convex optimization"
        - "non-convex optimization"
        - "proximal gradient methods"
        - "ADMM"
        - "mirror descent"
        # Linear Algebra
        - "matrix factorization"
        - "singular value decomposition"
        - "tensor decomposition"
        - "low-rank approximation"
        # Neural Differential Equations
        - "neural ODE"
        - "physics-informed neural networks"
        - "Fourier neural operator"
        - "DeepONet"
        # Numerical
        - "automatic differentiation"
        - "numerical stability"
        - "implicit differentiation"
        # Theory
        - "loss surface"
        - "saddle points"
      weight: 0.8
      arxiv_categories: ["math.OC", "cs.NA", "math.NA", "cs.LG"]
    
    - name: "Software Engineering & MLOps"
      keywords:
        # Distributed
        - "distributed training"
        - "data parallelism"
        - "tensor parallelism"
        - "pipeline parallelism"
        - "ZeRO"
        - "FSDP"
        - "DeepSpeed"
        # Inference
        - "model serving"
        - "inference optimization"
        - "TensorRT"
        - "ONNX"
        - "dynamic batching"
        # Memory
        - "gradient checkpointing"
        - "memory efficient attention"
        - "CPU offload"
        # Hardware
        - "GPU optimization"
        - "CUDA kernels"
        - "hardware-aware training"
      weight: 1.0
      arxiv_categories: ["cs.SE", "cs.DC", "cs.LG", "cs.PF"]
    
    - name: "Data Engineering"
      keywords:
        # Features
        - "feature engineering"
        - "feature stores"
        - "automated feature engineering"
        # Processing
        - "data pipelines"
        - "stream processing"
        - "Apache Spark"
        - "Apache Flink"
        # Storage
        - "vector databases"
        - "approximate nearest neighbor"
        - "HNSW"
        - "columnar storage"
        - "data lakes"
        # Quality
        - "data drift"
        - "concept drift"
        - "data validation"
        - "data versioning"
        # Core
        - "distributed systems"
        - "batch processing"
      weight: 1.5 
      arxiv_categories: ["cs.DB", "cs.DC", "cs.IR"]

  # Exploratory interests - occasional searches
  exploratory:
    - name: "Physics & ML"
      keywords:
        - "physics-informed neural networks"
        - "scientific machine learning"
        - "physics simulation"
        - "computational physics"
        - "neural operators"
        - "surrogate modeling"
      weight: 0.5
      arxiv_categories: ["physics.comp-ph", "cs.LG"]
    
    - name: "Astronomy & ML"
      keywords:
        - "astrophysics machine learning"
        - "galaxy classification"
        - "exoplanet detection"
        - "cosmology machine learning"
        - "astrostatistics"
        - "astronomical data"
      weight: 0.5
      arxiv_categories: ["astro-ph.IM", "astro-ph.GA"]

# Search configuration
search_config:
  recency_days: 30
  min_relevance: 0.6
  papers_per_search: 20
  prefer_with_code: true
  exclude_seen: true
  sources:
    - arxiv
    - semantic_scholar
    - core

# Daily paper selection
daily_selection:
  papers_per_day: 3
  strategy: "balanced"
  ensure_diversity: true
