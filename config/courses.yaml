        prerequisites: ["de-graph-vector-db"]
        homework_due: "2026-04-10"
        
      # Week 14 - Apr 18: FINAL EXAM
      - id: "de-final"
        name: "Final Exam"
        week_covered: 14
        date_covered: "2026-04-18"
        key_concepts:
