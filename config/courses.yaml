  # ============================================================
  # DEEP LEARNING AND NLP (SEAS 8520)
  # ============================================================
  - id: "dl-nlp"
    name: "Deep Learning and Natural Language Processing"
    code: "SEAS 8520-A5A"
    term: "Spring 2026"
    instructor: "Rami El-Youssef"
    schedule: "Fridays 1-4pm ET"
    
    description: >
      Deep dive into deep learning fundamentals, spanning ANN, MLP, backpropagation, 
      activation functions, regularization and optimization techniques. Advance through 
      topics like hyperparameter tuning, CNNs, NLP and LLMs.
    
    textbooks:
      - title: "Deep Learning with Python, 2nd Edition"
        authors: "François Chollet"
        path: "dl-nlp/textbooks/deeplearningwithpython.pdf"
    
    tools:
      - "TensorFlow"
      - "Keras"
      - "Google Colab"
    
    topics:
      # Week 1 - Jan 17
      - id: "dlnlp-intro-ann"
        name: "Introduction to Deep Learning and ANNs"
        week_covered: 1
        date_covered: "2026-01-17"
        key_concepts:
          - "artificial neural networks (ANN)"
          - "neurons and layers"
          - "weights and biases"
          - "forward propagation"
          - "deep learning fundamentals"
          - "history of neural networks"
        learning_objectives:
          - "Understand the structure of artificial neural networks"
          - "Explain how information flows through a neural network"
          - "Set up TensorFlow/Keras environment"
        resources:
          - "dl-nlp/textbooks/deeplearningwithpython.pdf"
        quiz_difficulty: "easy"
        
      # Week 2 - Jan 24
      - id: "dlnlp-mlp"
        name: "Multilayer Perceptron (MLP) Architecture"
        week_covered: 2
        date_covered: "2026-01-24"
        key_concepts:
          - "multilayer perceptron"
          - "hidden layers"
          - "network depth vs width"
          - "universal approximation theorem"
          - "MLP architecture design"
        learning_objectives:
          - "Design MLP architectures for different problems"
          - "Understand the role of hidden layers"
          - "Implement MLPs in Keras"
        resources:
          - "dl-nlp/textbooks/deeplearningwithpython.pdf"
        quiz_difficulty: "easy"
        prerequisites: ["dlnlp-intro-ann"]
        homework_due: "2026-01-23"
        
      # Week 3 - Jan 31
      - id: "dlnlp-essentials"
        name: "Neural Network Essentials: Gradient Descent, Backprop, Activations"
        week_covered: 3
        date_covered: "2026-01-31"
        key_concepts:
          - "gradient descent"
          - "stochastic gradient descent (SGD)"
          - "mini-batch gradient descent"
          - "backpropagation"
          - "chain rule"
          - "activation functions"
          - "ReLU"
          - "sigmoid"
          - "tanh"
          - "softmax"
          - "vanishing gradients"
        learning_objectives:
          - "Compute gradients using backpropagation"
          - "Choose appropriate activation functions"
          - "Understand and mitigate vanishing gradient problem"
        resources:
          - "dl-nlp/textbooks/deeplearningwithpython.pdf"
        quiz_difficulty: "medium"
        prerequisites: ["dlnlp-mlp"]
        homework_due: "2026-01-30"
        
      # Week 4 - Feb 7
      - id: "dlnlp-regularization"
        name: "Regularization and Optimization Techniques"
        week_covered: 4
        date_covered: "2026-02-07"
        key_concepts:
          - "overfitting"
          - "underfitting"
          - "bias-variance tradeoff"
          - "L1 regularization (Lasso)"
          - "L2 regularization (Ridge)"
          - "dropout"
          - "early stopping"
          - "batch normalization"
          - "data augmentation"
        learning_objectives:
          - "Identify and address overfitting"
          - "Apply regularization techniques appropriately"
          - "Implement dropout and batch normalization"
        resources:
          - "dl-nlp/textbooks/deeplearningwithpython.pdf"
        quiz_difficulty: "medium"
        prerequisites: ["dlnlp-essentials"]
        homework_due: "2026-02-06"
        
      # Week 5 - Feb 14
      - id: "dlnlp-optimization-hpo"
        name: "Advanced Optimization and Hyperparameter Tuning"
        week_covered: 5
