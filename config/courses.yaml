# Daily Scholar - Course Materials Configuration
# Updated based on GWU Spring 2026 syllabi
#
# RESOURCE PATHS: Resources are relative to uploads/course_materials/
# Example: "data-engineering/textbooks/Fundamentals_of_Data_Engineering.pdf"

courses:
  # ============================================================
  # DATA ENGINEERING FOR AI (SEAS 8515)
  # ============================================================
  - id: "data-engineering"
    name: "Data Engineering for AI"
    code: "SEAS 8515-A5A"
    term: "Spring 2026"
    instructor: "Dr. Adewale Akinfaderin"
    schedule: "Saturdays 9am-12pm ET"
    
    description: >
      Developing python scripts to automate data pipelines, data ingestion, 
      data processing, and data warehousing. Machine learning applications 
      with Python including text mining and time series analysis.
    
    textbooks:
      - title: "Fundamentals of Data Engineering"
        authors: "Joe Reis, Matt Housley"
        path: "data-engineering/textbooks/Fundamentals_of_Data_Engineering.pdf"
      - title: "Python for Data Analysis, 3rd Edition"
        authors: "Wes McKinney"
        path: "data-engineering/textbooks/Python_for_Data_Analysis.pdf"
    
    tools:
      - "Databricks"
      - "Google Colab"
      - "Python IDE (VS Code)"
      - "Git"
    
    topics:
      # Week 1 - Jan 17
      - id: "de-python-foundations-1"
        name: "Python Foundations I – Syntax"
        week_covered: 1
        date_covered: "2026-01-17"
        key_concepts:
          - "Python syntax and indentation"
          - "variables and data types"
          - "loops and conditionals"
          - "functions"
          - "classes and OOP concepts"
          - "core data types (lists, tuples, dicts, sets)"
          - "basic debugging"
          - "exception handling"
        learning_objectives:
          - "Set up Python development environment (VS Code/Colab)"
          - "Write basic Python programs with proper syntax"
          - "Implement functions and classes"
          - "Handle exceptions gracefully"
        resources:
          - "data-engineering/textbooks/Python_for_Data_Analysis.pdf"
        quiz_difficulty: "easy"
        
      # Week 2 - Jan 24
      - id: "de-python-foundations-2"
        name: "Python Foundations II – Practical Programming"
        week_covered: 2
        date_covered: "2026-01-24"
        key_concepts:
          - "reading/writing files (CSV, JSON, TXT, Images)"
          - "file paths and directory navigation"
          - "connecting to external resources (Google Drive, S3)"
          - "importing modules"
          - "scripts vs notebooks"
          - "Git project organization"
          - "NumPy fundamentals"
          - "Pandas fundamentals"
          - "Polars basics"
        learning_objectives:
          - "Read and write various file formats in Python"
          - "Connect to cloud storage resources"
          - "Organize code into reusable modules"
          - "Use NumPy and Pandas for data manipulation"
        resources:
          - "data-engineering/textbooks/Python_for_Data_Analysis.pdf"
        quiz_difficulty: "easy"
        prerequisites: ["de-python-foundations-1"]
        homework_due: "2026-01-23"
        
      # Week 3 - Jan 31
      - id: "de-distributed-computing"
        name: "Fundamentals of Distributed Computing and Data Storage"
        week_covered: 3
        date_covered: "2026-01-31"
        key_concepts:
          - "introduction to data engineering"
          - "Hadoop ecosystem"
          - "HDFS"
          - "AWS S3"
          - "data lake storage concepts"
          - "fundamentals of distributed computing"
          - "storage impact on ML pipelines"
        learning_objectives:
          - "Understand the data engineering lifecycle"
          - "Compare different distributed storage systems"
          - "Explain how storage choices affect ML pipelines"
        resources:
          - "data-engineering/textbooks/Fundamentals_of_Data_Engineering.pdf"
        reading_assignment: "FoDE Chapter 1"
        quiz_difficulty: "medium"
        prerequisites: ["de-python-foundations-2"]
        homework_due: "2026-01-30"
        
      # Week 4 - Feb 7
      - id: "de-spark-fundamentals"
        name: "Data Science Workflow, Resource Management and Spark"
        week_covered: 4
        date_covered: "2026-02-07"
        key_concepts:
          - "Spark basics"
          - "driver/executor model"
          - "resource management"
          - "cluster modes"
          - "jobs and DAG execution"
          - "data engineering lifecycle"
          - "data architecture design"
        learning_objectives:
          - "Understand Spark's architecture and execution model"
          - "Configure Spark resources appropriately"
          - "Design good data architecture"
        resources:
          - "data-engineering/textbooks/Fundamentals_of_Data_Engineering.pdf"
        reading_assignment: "FoDE Chapters 2-3"
        quiz_difficulty: "medium"
        prerequisites: ["de-distributed-computing"]
        homework_due: "2026-02-06"
        
      # Week 5 - Feb 14
      - id: "de-data-ingestion"
        name: "Data Ingestion Techniques and Tools"
        week_covered: 5
        date_covered: "2026-02-14"
        key_concepts:
          - "REST APIs"
          - "GraphQL APIs"
          - "pagination"
          - "API authentication"
          - "streaming concepts"
          - "Python ingestion scripts"
          - "ETL in modern systems"
        learning_objectives:
          - "Build Python scripts to ingest data from APIs"
          - "Handle pagination and authentication"
          - "Understand streaming vs batch ingestion"
        resources:
          - "data-engineering/textbooks/Fundamentals_of_Data_Engineering.pdf"
        reading_assignment: "FoDE Chapter 7 - Ingestion"
        quiz_difficulty: "medium"
        prerequisites: ["de-spark-fundamentals"]
        homework_due: "2026-02-13"
        
      # Week 6 - Feb 21
      - id: "de-spark-processing"
        name: "Data Processing with Apache Spark and Streaming"
        week_covered: 6
        date_covered: "2026-02-21"
        key_concepts:
          - "Spark transformations"
          - "processing data at scale"
          - "streaming data"
          - "incremental processing"
          - "choosing technologies"
          - "data generation in source systems"
        learning_objectives:
          - "Apply Spark transformations for large-scale data processing"
          - "Implement streaming data pipelines"
          - "Choose appropriate technologies for data engineering"
        resources:
          - "data-engineering/textbooks/Fundamentals_of_Data_Engineering.pdf"
        reading_assignment: "FoDE Chapters 4-5"
        quiz_difficulty: "hard"
        prerequisites: ["de-data-ingestion"]
        homework_due: "2026-02-20"
        
      # Week 7 - Feb 28: MIDTERM EXAM
      - id: "de-midterm"
        name: "Midterm Exam"
        week_covered: 7
        date_covered: "2026-02-28"
        key_concepts:
          - "comprehensive review weeks 1-6"
        learning_objectives:
          - "Demonstrate mastery of Python foundations"
          - "Demonstrate mastery of distributed computing concepts"
          - "Demonstrate mastery of Spark and data ingestion"
        resources: []
        quiz_difficulty: "hard"
        is_exam: true
        
      # Week 8 - Mar 7
      - id: "de-querying"
        name: "Data Querying and Business Insights"
        week_covered: 8
        date_covered: "2026-03-07"
        key_concepts:
          - "analytical SQL"
          - "data visualization"
          - "querying structured data"
          - "reproducible query workflows"
          - "dashboards"
        learning_objectives:
          - "Write analytical SQL for business insights"
          - "Build reproducible query workflows"
          - "Create effective data visualizations"
        resources:
          - "data-engineering/textbooks/Fundamentals_of_Data_Engineering.pdf"
        reading_assignment: "FoDE Chapter 8 - Queries, Modeling, and Transformation"
        quiz_difficulty: "medium"
        prerequisites: ["de-spark-processing"]
        homework_due: "2026-03-06"
        
      # Week 9 - Mar 14
      - id: "de-warehousing"
        name: "Data Warehousing and Data Architectures"
        week_covered: 9
        date_covered: "2026-03-14"
        key_concepts:
          - "data warehouse modeling"
          - "data architecture patterns"
          - "BI vs AI data engineering"
          - "Snowflake"
          - "BigQuery"
          - "Redshift"
          - "warehouse architectures"
        learning_objectives:
          - "Design data warehouse schemas"
          - "Compare major cloud warehouse platforms"
          - "Choose appropriate architecture for use case"
        resources:
          - "data-engineering/textbooks/Fundamentals_of_Data_Engineering.pdf"
        reading_assignment: "FoDE Chapter 6 - Storage"
        quiz_difficulty: "medium"
        prerequisites: ["de-querying"]
        homework_due: "2026-03-13"
        
      # Week 10 - Mar 21
      - id: "de-orchestration"
        name: "Building and Orchestrating Reliable Data Pipelines"
        week_covered: 10
        date_covered: "2026-03-21"
        key_concepts:
          - "pipeline orchestration"
          - "Apache Airflow"
          - "scheduling"
          - "retries and error handling"
          - "DAG management"
          - "Delta Live Tables"
        learning_objectives:
          - "Build orchestrated data pipelines with Airflow"
          - "Implement scheduling and retry logic"
          - "Manage DAG dependencies"
        resources: []
        quiz_difficulty: "hard"
        prerequisites: ["de-warehousing"]
        homework_due: "2026-03-20"
        
      # Week 11 - Mar 28
      - id: "de-mlops"
        name: "Scalable ML, Advanced Modeling, and MLOps"
        week_covered: 11
        date_covered: "2026-03-28"
        key_concepts:
          - "feature engineering at scale"
          - "data preprocessing at scale"
          - "experiment tracking"
          - "MLflow"
          - "Weights & Biases"
          - "containerization"
          - "Docker"
          - "Kubernetes"
          - "infrastructure as code"
        learning_objectives:
          - "Implement feature engineering pipelines at scale"
          - "Track ML experiments with MLflow/W&B"
          - "Containerize ML applications"
        resources:
          - "data-engineering/textbooks/Fundamentals_of_Data_Engineering.pdf"
        reading_assignment: "FoDE Chapter 9 - Serving Data"
        quiz_difficulty: "hard"
        prerequisites: ["de-orchestration"]
        homework_due: "2026-03-27"
        
      # Week 12 - Apr 4
      - id: "de-graph-vector-db"
        name: "Graph and Vector Databases"
        week_covered: 12
        date_covered: "2026-04-04"
        key_concepts:
          - "graph models"
          - "nodes, edges, properties"
          - "graph neural networks"
          - "Neo4j"
          - "Cypher query language"
          - "Pinecone"
          - "vector databases"
        learning_objectives:
          - "Model data as graphs"
          - "Query graph databases with Cypher"
          - "Understand vector database use cases for AI"
        resources: []
        quiz_difficulty: "medium"
        prerequisites: ["de-mlops"]
        homework_due: "2026-04-03"
        
      # Week 13 - Apr 11
      - id: "de-special-topics"
        name: "Special Topics and Course Recap"
        week_covered: 13
        date_covered: "2026-04-11"
        key_concepts:
          - "emerging trends in data engineering"
          - "course review"
          - "integration of concepts"
        learning_objectives:
