        resources: []
        quiz_difficulty: "hard"
        prerequisites: ["dlnlp-llm-techniques"]
        homework_due: "2026-03-27"
        
      # Week 12 - Apr 4
      - id: "dlnlp-deployment"
        name: "LLM Landscape, Deployment, and Generation Control"
        week_covered: 12
        date_covered: "2026-04-04"
        key_concepts:
