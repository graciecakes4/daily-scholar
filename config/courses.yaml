# ============================================================
# REVIEW CONFIGURATION
# ============================================================
review_config:
  topics_per_day: 2
  strategy: "spaced_repetition"
  
  spaced_repetition:
    initial_interval: 1
    success_multiplier: 2.0
    failure_multiplier: 0.5
    max_interval: 30
  
  # Skip exam weeks for reviews
  skip_exam_topics: true

# ============================================================
# QUIZ CONFIGURATION
# ============================================================
quiz_config:
  questions_per_session: 5
  
  question_types:
    - "multiple_choice"
    - "true_false"
    - "short_answer"
    - "explain_concept"
    - "apply_scenario"
    - "compare_contrast"
    - "code_completion"
  
  type_distribution:
    multiple_choice: 0.35
    true_false: 0.10
    short_answer: 0.15
    explain_concept: 0.15
    apply_scenario: 0.10
    compare_contrast: 0.05
    code_completion: 0.10
  
  include_prerequisites: true
  difficulty_mode: "adaptive"
  
  # Focus more on recent material
  recency_weight: 0.3

# ============================================================
# FILE UPLOAD SETTINGS
# ============================================================
upload_config:
  allowed_extensions:
    - ".pdf"
    - ".docx"
    - ".pptx"
    - ".md"
    - ".txt"
    - ".py"
    - ".ipynb"
  
  max_file_size_mb: 50
  storage_path: "uploads/course_materials"