          - "random search"
          - "Bayesian optimization"
        learning_objectives:
          - "Choose and configure optimizers"
          - "Implement learning rate schedules"
          - "Use Keras Tuner for hyperparameter optimization"
        resources:
          - "dl-nlp/textbooks/deeplearningwithpython.pdf"
        quiz_difficulty: "medium"
        prerequisites: ["dlnlp-regularization"]
        homework_due: "2026-02-13"
        
      # Week 6 - Feb 21
      - id: "dlnlp-cnn"
        name: "Convolutional Neural Networks (CNNs)"
        week_covered: 6
        date_covered: "2026-02-21"
        key_concepts:
